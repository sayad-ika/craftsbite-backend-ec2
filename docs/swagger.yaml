      parameters:
      - description: 'Number of days to forecast (default: 7)'
        in: query
        name: days
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Forecast retrieved successfully
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get headcount forecast
      tags:
      - headcount
  /headcount/today:
    get:
      description: Get today's and tomorrow's meal headcount summary (Admin/Logistics
