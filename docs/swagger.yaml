  /headcount/{date}/stream:
    get:
      description: Stream real-time headcount updates for a specific date via Server-Sent
        Events (Admin/Logistics only)
      parameters:
      - description: Date (YYYY-MM-DD)
        in: path
        name: date
        required: true
        type: string
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream
          schema:
            type: string
        "400":
          description: Validation error
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Stream headcount updates
      tags:
      - headcount
  /headcount/forecast:
    get:
      description: Get meal headcount forecast for upcoming days (Admin/Logistics
