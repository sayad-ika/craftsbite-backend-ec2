basePath: /api/v1
definitions:
  handlers.AdminBulkOptOutRequest:
    properties:
      end_date:
        type: string
      meal_types:
        items:
          type: string
        minItems: 1
        type: array
      reason:
        type: string
      start_date:
        type: string
      user_ids:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - end_date
    - meal_types
    - reason
    - start_date
    - user_ids
    type: object
  handlers.CreateBulkOptOutRequest:
    properties:
      end_date:
        type: string
      meal_type:
        type: string
      start_date:
        type: string
    required:
    - end_date
    - meal_type
    - start_date
    type: object
  handlers.CreateScheduleRequest:
    properties:
      available_meals:
        items:
          type: string
        type: array
      date:
        type: string
      day_status:
        type: string
      reason:
        type: string
    required:
    - date
    - day_status
    type: object
  handlers.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  handlers.OverrideParticipationRequest:
    properties:
      date:
        type: string
      meal_type:
        type: string
      participating:
        type: boolean
      reason:
        type: string
      user_id:
        type: string
    required:
    - date
    - meal_type
    - participating
    - reason
    - user_id
    type: object
  handlers.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 8
        type: string
      role:
        type: string
    required:
    - email
    - name
    - password
    - role
    type: object
  handlers.SetParticipationRequest:
    properties:
      date:
        type: string
      meal_type:
        type: string
      participating:
        type: boolean
    required:
    - date
    - meal_type
    - participating
    type: object
  handlers.UpdatePreferencesRequest:
    properties:
      default_meal_preference:
        type: string
    required:
    - default_meal_preference
    type: object
  handlers.UpdateScheduleRequest:
    properties:
      available_meals:
        items:
          type: string
        type: array
      day_status:
        type: string
      reason:
        type: string
    type: object
  handlers.adminSetLocationRequest:
    properties:
      date:
        type: string
      location:
        type: string
      reason:
        type: string
      user_id:
        type: string
    required:
    - date
    - location
    - user_id
    type: object
  handlers.createWFHPeriodRequest:
    properties:
      end_date:
        type: string
      reason:
        type: string
      start_date:
        type: string
    required:
    - end_date
    - start_date
    type: object
  handlers.setLocationRequest:
    properties:
      date:
        type: string
      location:
        type: string
    required:
    - date
    - location
    type: object
  models.Role:
    enum:
    - employee
    - team_lead
    - admin
    - logistics
    type: string
    x-enum-varnames:
    - RoleEmployee
    - RoleTeamLead
    - RoleAdmin
    - RoleLogistics
  services.CreateUserInput:
    properties:
      default_meal_preference:
        type: string
      email:
        type: string
      name:
        type: string
      password:
        minLength: 8
        type: string
      role:
        $ref: '#/definitions/models.Role'
    required:
    - email
    - name
    - password
    - role
    type: object
  services.UpdateUserInput:
    properties:
      default_meal_preference:
        type: string
      name:
        type: string
      password:
        minLength: 8
        type: string
      role:
        $ref: '#/definitions/models.Role'
    type: object
host: localhost:8080
info:
  contact:
    email: support@craftsbite.com
    name: API Support
  description: CraftsBite Backend API for meal management system
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: CraftsBite API
  version: "1.0"
paths:
  /admin/meals/bulk-optouts:
    post:
      consumes:
      - application/json
      description: Create bulk opt-outs for multiple users (Admin/Team Lead only)
      parameters:
      - description: Admin bulk opt-out details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.AdminBulkOptOutRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Admin bulk opt-out processed
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Validation error
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Admin bulk opt-out
      tags:
      - admin
  /admin/meals/history/{user_id}:
    get:
      description: Get meal participation history for a specific user (Admin/Logistics
        only)
      parameters:
      - description: User ID
        in: path
        name: user_id
        required: true
        type: string
      - description: Start date (YYYY-MM-DD)
        in: query
        name: start_date
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: end_date
        type: string
      - description: Meal type filter
        in: query
        name: meal_type
        type: string
      - description: Result limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: User history retrieved successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Validation error
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get user history (Admin)
      tags:
      - admin
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with email and password
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Validation error
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Invalid credentials
          schema:
            additionalProperties: true
            type: object
      summary: User login
      tags:
      - auth
  /auth/logout:
    post:
      description: Logout current user and clear auth cookie
      produces:
      - application/json
      responses:
        "200":
          description: Logout successful
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: User logout
      tags:
      - auth
  /auth/me:
    get:
      description: Get authenticated user details
      produces:
      - application/json
      responses:
        "200":
          description: User retrieved successfully
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: User not found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account and auto-login
      parameters:
      - description: Registration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User registered successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Validation error or registration failed
          schema:
            additionalProperties: true
            type: object
      summary: Register new user
      tags:
      - auth
  /headcount/{date}:
    get:
      description: Get meal headcount summary for a specific date (Admin/Logistics
