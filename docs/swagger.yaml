      security:
      - BearerAuth: []
      summary: Get schedule by date
      tags:
      - schedules
    put:
      consumes:
      - application/json
      description: Update an existing meal schedule (Admin/Logistics only)
      parameters:
      - description: Date (YYYY-MM-DD)
        in: path
        name: date
        required: true
