name: Deploy Craftsbite Backend to AWS EC2 using Terraform

on:
    push:
        branches:
            - main
            - master

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v5

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v6.1.0
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ secrets.AWS_REGION }}

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.22"

            - name: Build binary
              run: |
                  GOOS=linux GOARCH=amd64 go build -o craftsbite-server cmd/server/main.go

            - name: Upload binary to S3
              run: |
                  aws s3 cp craftsbite-server s3://trainee-2026-sayad-craftsbite/craftsbite-server

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v4
              with:
                  terraform_version: 1.14.8

            - name: Terraform Init
              working-directory: ./terraform
              run: terraform init

            - name: Terraform Plan
              working-directory: ./terraform
              run: terraform plan

            - name: Terraform Apply
              working-directory: ./terraform
              run: terraform apply -auto-approve

            - name: Print deployment URLs
              working-directory: ./terraform
              run: terraform output
